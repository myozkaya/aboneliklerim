name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax kontrolü
        run: node --check index.js

      - name: Uygulamayı örnek veriyle çalıştır
        run: |
          cp abonelikler.example.json abonelikler.json
          printf "1\n2\n6\n" | node index.js
